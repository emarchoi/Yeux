<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
        <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

        <script src="{{ url_for('static', filename='script.js') }}"></script>

        <title>{% block title %}Yeux{% endblock %}</title>
    </head>

    <body class="yeux-bg d-flex flex-column vh-100">

        <nav class="navbar px-2 px-md-4 py-2">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-2 gap-md-3">
                    <a href="/home">
                        <img src="{{ url_for('static', filename='yeux_logo.png') }}" 
                            alt="Yeux Logo" 
                            style="height: clamp(40px, 8vw, 40px);">
                    </a>
                    <div class="d-flex gap-1 gap-md-2">
                        {% block nav %}{% endblock %}
                    </div>
                </div>
                <div>
                    <a href="/logout">
                        <button class="btn yeux-lg-btn d-flex align-items-center justify-content-center" 
                                style="width: 45px; height: 45px;">
                            <i class="bi bi-box-arrow-right"></i>
                        </button>
                    </a>
                </div>
            </div>
        </nav>

        <main class="d-flex flex-column justify-content-center align-items-center vh-100">
            
            {% if self.page() %}
            <div class="container-fluid mb-4">
                <div class="row justify-content-center">
                    <div class="col-12 col-xl-10">
                        {% block page %}{% endblock %}
                    </div>
                </div>
            </div>
            {% endif %}

            <div class="container d-flex justify-content-center align-items-center">
                {% block content %}{% endblock %}
            </div>
            
        </main>

    </body>

</html>
